<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Generating… — Concept LB</title>
  <link rel="stylesheet" href="/admin.css" />
  <script>
    (function() {
      if (localStorage.getItem('conceptlb_theme') === 'light') document.documentElement.classList.add('light');
    })();
  </script>
</head>
<body>
  <div class="wrap" style="max-width:720px;">
    <div class="topbar" style="margin-bottom:16px;">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1 style="margin:0;">Generating your plan…</h1>
          <div class="sub">This usually takes 2–4 minutes</div>
        </div>
      </div>
      <button class="theme-toggle" type="button" onclick="toggleTheme()" title="Toggle theme" id="themeBtn">🌙</button>
    </div>

    <div class="card">
      <div class="card-body">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
          <div style="font-size:16px; font-weight:600;" id="statusText">Starting…</div>
          <div class="pill" id="pct">0%</div>
        </div>

        <div class="job-bar">
          <div class="job-fill" id="fill" style="width:0%;"></div>
        </div>

        <div class="text-muted text-small" style="margin-top:10px;">Job: {{ job_id }}</div>

        <div class="job-log" id="log"></div>
        <div class="job-error" id="err"></div>

        <div id="doneRow" style="display:none; margin-top:16px; display:none;">
          <div style="display:flex; gap:12px; align-items:center;">
            <a class="btn btn-primary" id="viewBtn" href="#">View Plan</a>
            <a class="btn btn-secondary" href="/wizard">New Plan</a>
            <a class="text-muted" href="/plans" style="text-decoration:none;">All Plans</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const isLight = html.classList.toggle('light');
      localStorage.setItem('conceptlb_theme', isLight ? 'light' : 'dark');
      document.getElementById('themeBtn').textContent = isLight ? '☀️' : '🌙';
    }
    if (localStorage.getItem('conceptlb_theme') === 'light') {
      document.getElementById('themeBtn').textContent = '☀️';
    }

    const jobId = "{{ job_id }}";
    const fill = document.getElementById("fill");
    const pct = document.getElementById("pct");
    const statusText = document.getElementById("statusText");
    const logEl = document.getElementById("log");
    const errEl = document.getElementById("err");
    const doneRow = document.getElementById("doneRow");
    const viewBtn = document.getElementById("viewBtn");

    function setProgress(p, text) {
      const clamped = Math.max(0, Math.min(100, p));
      fill.style.width = clamped + "%";
      pct.textContent = clamped.toFixed(0) + "%";
      if (text) statusText.textContent = text;
    }

    function addLog(line) {
      logEl.textContent += (line + "\n");
      logEl.scrollTop = logEl.scrollHeight;
    }

    const es = new EventSource(`/api/jobs/${jobId}/events`);

    es.addEventListener("progress", (ev) => {
      const data = JSON.parse(ev.data);
      setProgress(data.percent || 0, data.message || "");
      if (data.log) addLog(data.log);
    });

    es.addEventListener("done", (ev) => {
      const data = JSON.parse(ev.data);
      es.close();
      setProgress(100, "Done ✅");

      // Show token usage
      const tu = data.token_usage;
      if (tu) {
        const box = document.createElement("div");
        box.style.cssText = "margin-top:16px; padding:16px; border-radius:12px; border:1px solid var(--border); background:var(--surface);";
        box.innerHTML = `
          <div style="font-weight:700; font-size:14px; margin-bottom:10px; color:var(--accent);">Token Usage & Cost</div>
          <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; font-size:13px;">
            <div><span style="color:var(--dim);">Input</span><br><strong>${(tu.input_tokens || 0).toLocaleString()}</strong> tokens<br><span style="color:var(--dim);">$${(tu.input_cost_usd || 0).toFixed(4)}</span></div>
            <div><span style="color:var(--dim);">Output</span><br><strong>${(tu.output_tokens || 0).toLocaleString()}</strong> tokens<br><span style="color:var(--dim);">$${(tu.output_cost_usd || 0).toFixed(4)}</span></div>
            <div><span style="color:var(--dim);">Total</span><br><strong>${(tu.total_tokens || 0).toLocaleString()}</strong> tokens<br><strong style="color:var(--accent);">$${(tu.total_cost_usd || 0).toFixed(4)}</strong></div>
          </div>
          <div style="margin-top:8px; font-size:12px; color:var(--dim);">${tu.api_calls || 0} API calls &bull; Model: ${tu.model || '?'}</div>
        `;
        document.querySelector(".card-body").appendChild(box);
      }

      const viewUrl = data.view_url || `/jobs/${jobId}/view`;
      viewBtn.href = viewUrl;
      doneRow.style.display = "block";

      // Longer delay so user can see the token stats
      setTimeout(() => { window.location.href = viewUrl; }, tu ? 5000 : 600);
    });

    es.addEventListener("error", (ev) => {
      // browser reconnect events — ignore
    });

    es.addEventListener("job_error", (ev) => {
      const data = JSON.parse(ev.data);
      es.close();
      errEl.textContent = data.error || "Unknown error";
      statusText.textContent = "Failed ❌";
      doneRow.style.display = "block";
      viewBtn.style.display = "none";
    });
  </script>
</body>
</html>
