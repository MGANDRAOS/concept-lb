<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Generating… — Concept LB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* === Dark cinematic theme === */
    :root {
      --bg-0: #0a0e1c;
      --bg-1: #141d35;
      --ink: #f5f1ea;
      --ink-dim: rgba(245, 241, 234, 0.55);
      --ink-faint: rgba(245, 241, 234, 0.25);
      --accent: #c7a46c; /* warm gold */
      --accent-glow: rgba(199, 164, 108, 0.35);
      --err: #e06c75;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      color: var(--ink);
      background: radial-gradient(ellipse at top, var(--bg-1) 0%, var(--bg-0) 70%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* particles — CSS-only, layered radial gradients drifting slowly */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(1.2px 1.2px at 12% 22%, rgba(255,255,255,0.35) 50%, transparent 51%),
        radial-gradient(1px 1px at 38% 41%, rgba(255,255,255,0.22) 50%, transparent 51%),
        radial-gradient(1.5px 1.5px at 67% 14%, rgba(255,255,255,0.28) 50%, transparent 51%),
        radial-gradient(1px 1px at 82% 63%, rgba(255,255,255,0.18) 50%, transparent 51%),
        radial-gradient(1.2px 1.2px at 22% 78%, rgba(255,255,255,0.30) 50%, transparent 51%),
        radial-gradient(1px 1px at 54% 88%, rgba(255,255,255,0.22) 50%, transparent 51%),
        radial-gradient(1.5px 1.5px at 91% 35%, rgba(255,255,255,0.26) 50%, transparent 51%),
        radial-gradient(1px 1px at 8% 58%, rgba(255,255,255,0.20) 50%, transparent 51%),
        radial-gradient(1.3px 1.3px at 46% 72%, rgba(255,255,255,0.24) 50%, transparent 51%),
        radial-gradient(1px 1px at 72% 48%, rgba(255,255,255,0.18) 50%, transparent 51%),
        radial-gradient(1.2px 1.2px at 30% 8%, rgba(255,255,255,0.26) 50%, transparent 51%),
        radial-gradient(1px 1px at 96% 82%, rgba(255,255,255,0.20) 50%, transparent 51%);
      animation: drift 60s linear infinite;
      opacity: 0.9;
    }
    @keyframes drift {
      from { transform: translate3d(0, 0, 0); }
      to { transform: translate3d(-40px, -30px, 0); }
    }

    /* TOP: progress region */
    .progress-region {
      flex: 0 0 35vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 48px 24px;
      text-align: center;
      position: relative;
      z-index: 2;
    }
    .concept-name {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin-bottom: 18px;
    }
    .status-line {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 500;
      font-size: clamp(22px, 3.2vw, 32px);
      color: var(--ink);
      margin-bottom: 32px;
      min-height: 1.4em;
    }
    .progress-row {
      display: flex;
      align-items: center;
      gap: 16px;
      width: min(620px, 84%);
    }
    .progress-outer {
      flex: 1 1 auto;
      height: 2px;
      background: rgba(255, 255, 255, 0.06);
      position: relative;
      border-radius: 1px;
    }
    .progress-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #e5c28f);
      border-radius: 1px;
      box-shadow: 0 0 14px var(--accent-glow);
      transition: width 0.6s ease;
    }
    .progress-pct {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      color: var(--ink-dim);
      min-width: 3.5em;
      text-align: right;
    }

    /* BOTTOM: fact region */
    .fact-region {
      flex: 1 1 65vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px 48px 56px;
      position: relative;
      z-index: 2;
    }
    .fact-card {
      max-width: 760px;
      width: 100%;
      text-align: center;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .fact-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .fact-topic {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3.5px;
      color: var(--accent);
      margin-bottom: 18px;
      text-transform: uppercase;
    }
    .fact-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 500;
      font-size: clamp(22px, 3.2vw, 36px);
      line-height: 1.45;
      color: var(--ink);
    }
    .fact-timer {
      margin: 44px auto 0;
      width: 120px;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      position: relative;
      overflow: hidden;
    }
    .fact-timer-bar {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0;
      background: var(--accent);
      animation: timer-advance 15s linear forwards;
    }
    @keyframes timer-advance {
      from { width: 0%; }
      to { width: 100%; }
    }

    /* placeholder while facts not yet loaded */
    .fact-placeholder {
      color: var(--ink-faint);
      font-style: italic;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    /* token usage box (done state) */
    .token-box {
      margin-top: 28px;
      padding: 20px 28px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      width: min(560px, 80%);
      opacity: 0;
      transition: opacity 0.6s ease 0.4s;
    }
    .token-box.visible { opacity: 1; }
    .token-box h4 {
      font-size: 10px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .token-box-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      font-size: 13px;
    }
    .token-box-cell .label {
      color: var(--ink-dim);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .token-box-cell .val {
      font-size: 16px;
      font-weight: 600;
    }
    .token-box-cell .sub {
      color: var(--ink-dim);
      font-size: 11px;
      margin-top: 2px;
    }

    /* error state */
    .error-card {
      background: rgba(224, 108, 117, 0.12);
      border: 1px solid rgba(224, 108, 117, 0.3);
      border-radius: 10px;
      padding: 14px 18px;
      margin-top: 20px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: var(--err);
      max-width: 640px;
      white-space: pre-wrap;
      text-align: left;
    }

    /* cancel button — subtle, top-right */
    .cancel-btn {
      position: fixed;
      top: 20px;
      right: 24px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--ink-dim);
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      z-index: 10;
    }
    .cancel-btn:hover:not(:disabled) {
      border-color: rgba(224, 108, 117, 0.4);
      color: var(--err);
    }
    .cancel-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }
    .cancel-btn.hidden { display: none; }

    /* mobile */
    @media (max-width: 720px) {
      html, body { overflow-y: auto; }
      .progress-region { flex: 0 0 auto; padding: 32px 20px 16px; }
      .fact-region { flex: 1 1 auto; padding: 16px 20px 40px; min-height: 60vh; }
      .status-line { font-size: 18px; }
      .fact-text { font-size: 20px; }
      .progress-row { width: 100%; }
      .cancel-btn { top: 12px; right: 12px; padding: 6px 10px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <div class="particles" aria-hidden="true"></div>

  <button type="button" class="cancel-btn" id="cancelBtn" title="Cancel generation">× Cancel</button>

  <section class="progress-region">
    <div class="concept-name" id="conceptName">Concept LB</div>
    <div class="status-line" id="statusText">Starting…</div>
    <div class="progress-row">
      <div class="progress-outer"><div class="progress-fill" id="fill"></div></div>
      <div class="progress-pct" id="pct">0%</div>
    </div>
    <div id="errorBox"></div>
    <div class="token-box" id="tokenBox"></div>
  </section>

  <section class="fact-region">
    <div class="fact-card" id="factCard">
      <div class="fact-placeholder" id="factPlaceholder">Preparing a few things worth knowing…</div>
      <div class="fact-topic" id="factTopic" style="display:none;"></div>
      <div class="fact-text" id="factText" style="display:none;"></div>
      <div class="fact-timer" id="factTimer" style="display:none;">
        <div class="fact-timer-bar" id="factTimerBar"></div>
      </div>
    </div>
  </section>

  <script>
    const jobId = "{{ job_id }}";
    const conceptNameRaw = {{ (concept_name or 'Your concept') | tojson }};
    document.getElementById("conceptName").textContent = conceptNameRaw;

    // --- State ---
    let facts = [];
    let factIdx = 0;
    let factRotationTimer = null;
    const FACT_DURATION_MS = 15000;

    // --- UI helpers ---
    const fill = document.getElementById("fill");
    const pct = document.getElementById("pct");
    const statusText = document.getElementById("statusText");
    const errBox = document.getElementById("errorBox");
    const tokenBox = document.getElementById("tokenBox");
    const factCard = document.getElementById("factCard");
    const factPlaceholder = document.getElementById("factPlaceholder");
    const factTopic = document.getElementById("factTopic");
    const factText = document.getElementById("factText");
    const factTimer = document.getElementById("factTimer");
    const factTimerBar = document.getElementById("factTimerBar");
    const cancelBtn = document.getElementById("cancelBtn");

    // Start with the card faded in so the placeholder is visible.
    requestAnimationFrame(() => factCard.classList.add("visible"));

    function setProgress(p, text) {
      const clamped = Math.max(0, Math.min(100, p));
      fill.style.width = clamped + "%";
      pct.textContent = clamped.toFixed(0) + "%";
      if (text) statusText.textContent = text;
    }

    function showFact(idx) {
      if (!facts.length) return;
      const f = facts[idx % facts.length];

      // Fade out current content
      factCard.classList.remove("visible");

      setTimeout(() => {
        factPlaceholder.style.display = "none";
        factTopic.style.display = "";
        factText.style.display = "";
        factTimer.style.display = "";
        factTopic.textContent = f.topic || "INSIGHT";
        factText.textContent = f.text;

        // Restart timer bar animation
        factTimerBar.style.animation = "none";
        // force reflow
        void factTimerBar.offsetWidth;
        factTimerBar.style.animation = "timer-advance " + (FACT_DURATION_MS / 1000) + "s linear forwards";

        // Fade in
        requestAnimationFrame(() => factCard.classList.add("visible"));
      }, 400);
    }

    function startFactRotation() {
      if (factRotationTimer) return;
      showFact(factIdx);
      factRotationTimer = setInterval(() => {
        factIdx = (factIdx + 1) % facts.length;
        showFact(factIdx);
      }, FACT_DURATION_MS);
    }

    function stopFactRotation() {
      if (factRotationTimer) {
        clearInterval(factRotationTimer);
        factRotationTimer = null;
      }
    }

    function hideCancelBtn() { cancelBtn.classList.add("hidden"); }

    function showCancelledState() {
      try { es.close(); } catch (_) {}
      stopFactRotation();
      hideCancelBtn();
      statusText.textContent = "Cancelled";
      // Clear any prior error content so we don't stack messages
      errBox.innerHTML = "";
      const box = document.createElement("div");
      box.className = "error-card";
      box.style.color = "var(--ink-dim)";
      box.style.borderColor = "rgba(255,255,255,0.12)";
      box.style.background = "rgba(255,255,255,0.04)";
      box.innerHTML = 'Generation cancelled. <a href="/wizard" style="color:var(--accent); text-decoration:none; margin-left:8px;">Start over →</a>';
      errBox.appendChild(box);
    }

    // --- Cancel handler ---
    // Transition the UI immediately on POST success. We don't wait for the
    // backend's SSE 'cancelled' event because the server thread may be blocked
    // inside a long LLM call (normalize_intake, a section bundle) that won't
    // hit a cancel checkpoint for tens of seconds. The server will still bail
    // at the next checkpoint to save compute.
    cancelBtn.addEventListener("click", async () => {
      if (cancelBtn.disabled) return;
      cancelBtn.disabled = true;
      cancelBtn.textContent = "Cancelling…";
      statusText.textContent = "Cancelling…";
      try {
        const resp = await fetch(`/api/jobs/${jobId}/cancel`, { method: "POST" });
        // 2xx (including 200 "already terminal") is enough for us — show the
        // cancelled state regardless. If the POST failed entirely, fall through.
        if (resp && resp.ok) {
          showCancelledState();
          return;
        }
      } catch (_) { /* fall through — still try to show cancelled UI */ }
      // Network failure: still show cancelled locally so the user isn't stuck.
      showCancelledState();
    });

    // --- SSE ---
    const es = new EventSource(`/api/jobs/${jobId}/events`);

    es.addEventListener("progress", (ev) => {
      try {
        const data = JSON.parse(ev.data);
        setProgress(data.percent || 0, data.message || "");
      } catch (_) { /* ignore */ }
    });

    es.addEventListener("facts", (ev) => {
      try {
        const data = JSON.parse(ev.data);
        if (Array.isArray(data.facts) && data.facts.length > 0) {
          facts = data.facts;
          factIdx = 0;
          startFactRotation();
        }
      } catch (_) { /* ignore */ }
    });

    es.addEventListener("cancelled", () => {
      // Server-confirmed cancellation. If the user already clicked cancel
      // client-side, this is a no-op; if they didn't (server cancelled for
      // another reason), fall into the same UI transition.
      showCancelledState();
    });

    es.addEventListener("done", (ev) => {
      try {
        const data = JSON.parse(ev.data);
        es.close();
        setProgress(100, "Done ✓");
        stopFactRotation();
        hideCancelBtn();

        // Token usage
        const tu = data.token_usage;
        if (tu) {
          tokenBox.innerHTML = `
            <h4>Token Usage</h4>
            <div class="token-box-grid">
              <div class="token-box-cell"><div class="label">Input</div><div class="val">${(tu.input_tokens || 0).toLocaleString()}</div><div class="sub">$${(tu.input_cost_usd || 0).toFixed(4)}</div></div>
              <div class="token-box-cell"><div class="label">Output</div><div class="val">${(tu.output_tokens || 0).toLocaleString()}</div><div class="sub">$${(tu.output_cost_usd || 0).toFixed(4)}</div></div>
              <div class="token-box-cell"><div class="label">Total</div><div class="val">${(tu.total_tokens || 0).toLocaleString()}</div><div class="sub">$${(tu.total_cost_usd || 0).toFixed(4)}</div></div>
            </div>
          `;
          requestAnimationFrame(() => tokenBox.classList.add("visible"));
        }

        const viewUrl = data.view_url || `/jobs/${jobId}/view`;
        setTimeout(() => { window.location.href = viewUrl; }, tu ? 3500 : 1500);
      } catch (_) { /* ignore */ }
    });

    es.addEventListener("job_error", (ev) => {
      try {
        const data = JSON.parse(ev.data);
        es.close();
        stopFactRotation();
        hideCancelBtn();
        statusText.textContent = "Something went wrong";
        const box = document.createElement("div");
        box.className = "error-card";
        box.textContent = data.error || "Unknown error";
        errBox.appendChild(box);
      } catch (_) { /* ignore */ }
    });
  </script>
</body>
</html>
