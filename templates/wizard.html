<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concept LB — Create Plan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fafafa; --bg2: #f4f4f5; --surface: #e4e4e7;
      --border: #d4d4d8; --border2: #a1a1aa;
      --text: #09090b; --text2: #27272a; --subtle: #71717a; --dim: #a1a1aa;
      --accent: #6366f1; --accent2: #4f46e5; --accent-glow: rgba(99,102,241,.1);
      --green: #059669; --green-bg: rgba(5,150,105,.06);
      --red: #dc2626; --red-bg: rgba(220,38,38,.05);
      --card: rgba(255,255,255,.9); --input: #ffffff;
      --radius: 12px; --transition: .2s cubic-bezier(.4,0,.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

    .chrome { position: fixed; top: 0; left: 0; right: 0; z-index: 100; backdrop-filter: blur(20px) saturate(1.4); background: rgba(250,250,250,.88); border-bottom: 1px solid var(--border); }
    .chrome-inner { max-width: 880px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .chrome-brand { display: flex; align-items: center; gap: 10px; }
    .chrome-logo { width: 28px; height: 28px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .chrome-brand span { font-weight: 700; font-size: 14px; letter-spacing: -.3px; }
    .chrome-actions { display: flex; gap: 6px; align-items: center; }
    .chrome-btn { padding: 7px 12px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--subtle); font-size: 13px; font-weight: 500; cursor: pointer; transition: var(--transition); font-family: inherit; }
    .chrome-btn:hover { border-color: var(--border2); color: var(--text); }
    .theme-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--subtle); cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: var(--transition); }
    .theme-btn:hover { border-color: var(--border2); color: var(--text); }

    .progress-track { position: fixed; top: 53px; left: 0; right: 0; z-index: 99; height: 3px; background: var(--border); }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 0 3px 3px 0; transition: width .4s cubic-bezier(.4,0,.2,1); }

    .main { max-width: 680px; margin: 0 auto; padding: 100px 24px 120px; }

    .step-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 999px; background: var(--accent-glow); border: 1px solid rgba(129,140,248,.2); color: var(--accent); font-size: 12px; font-weight: 600; letter-spacing: .3px; text-transform: uppercase; margin-bottom: 16px; }
    .step-title { font-size: 28px; font-weight: 800; letter-spacing: -.5px; line-height: 1.2; margin-bottom: 8px; }
    .step-desc { font-size: 16px; color: var(--subtle); line-height: 1.5; margin-bottom: 36px; max-width: 520px; }

    .fields { display: flex; flex-direction: column; gap: 20px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 600px) { .field-row { grid-template-columns: 1fr; } }
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-group.full { grid-column: 1 / -1; }
    .field-label { display: flex; align-items: center; gap: 8px; }
    .field-label label { font-size: 14px; font-weight: 600; color: var(--text2); }
    .field-label .req { font-size: 10px; font-weight: 700; color: var(--accent); background: var(--accent-glow); padding: 2px 6px; border-radius: 4px; letter-spacing: .3px; }

    input, textarea, select { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius); background: var(--input); color: var(--text); font-family: inherit; font-size: 15px; outline: none; transition: var(--transition); }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    input::placeholder, textarea::placeholder { color: var(--dim); }
    textarea { min-height: 100px; resize: vertical; line-height: 1.5; }
    select { cursor: pointer; }
    .field-hint { font-size: 13px; color: var(--dim); line-height: 1.4; }

    .chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip { padding: 9px 16px; border-radius: 999px; border: 1.5px solid var(--border); background: transparent; color: var(--text2); font-size: 14px; font-weight: 500; cursor: pointer; user-select: none; transition: var(--transition); }
    .chip:hover { border-color: var(--accent); background: var(--accent-glow); }
    .chip.on { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); font-weight: 600; }

    .tag-box { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius); background: var(--input); min-height: 48px; transition: var(--transition); }
    .tag-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .tag { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 6px; background: var(--surface); border: 1px solid var(--border); font-size: 13px; font-weight: 500; color: var(--text2); }
    .tag button { border: 0; background: transparent; color: var(--dim); cursor: pointer; font-size: 15px; line-height: 1; padding: 0; }
    .tag button:hover { color: var(--red); }
    .tag-input { flex: 1; min-width: 140px; border: 0 !important; background: transparent !important; padding: 4px !important; box-shadow: none !important; font-size: 14px; }

    .source-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .source-row span { font-size: 12px; color: var(--dim); }
    .source-row select { width: auto; padding: 4px 8px; font-size: 12px; border-radius: 6px; min-height: auto; }

    .divider { margin: 32px 0 24px; padding: 16px 20px; border-radius: var(--radius); background: linear-gradient(135deg, var(--accent-glow), transparent); border: 1px solid rgba(129,140,248,.15); }
    .divider h3 { font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
    .divider p { font-size: 13px; color: var(--subtle); }

    .review-grid { display: flex; flex-direction: column; gap: 16px; }
    .review-card { border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    .review-card-header { padding: 12px 16px; background: var(--surface); border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 700; color: var(--subtle); text-transform: uppercase; letter-spacing: .5px; display: flex; align-items: center; justify-content: space-between; }
    .review-card-header .edit-link { font-size: 12px; font-weight: 500; color: var(--accent); cursor: pointer; text-transform: none; letter-spacing: 0; }
    .review-card-body { padding: 4px 0; }
    .review-row { display: flex; justify-content: space-between; align-items: baseline; padding: 10px 16px; gap: 16px; }
    .review-row:not(:last-child) { border-bottom: 1px solid rgba(63,63,70,.3); }
    .review-key { font-size: 14px; color: var(--subtle); flex-shrink: 0; }
    .review-val { font-size: 14px; font-weight: 600; color: var(--text); text-align: right; word-break: break-word; }

    .warn { padding: 14px 18px; border-radius: var(--radius); background: var(--red-bg); border: 1px solid rgba(248,113,113,.2); color: var(--text); font-size: 14px; line-height: 1.5; white-space: pre-wrap; display: none; margin-top: 16px; }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; backdrop-filter: blur(20px) saturate(1.4); background: rgba(250,250,250,.92); border-top: 1px solid var(--border); }
    .bottom-nav-inner { max-width: 680px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .nav-steps { display: flex; gap: 4px; align-items: center; }
    .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: var(--transition); cursor: pointer; }
    .nav-dot.active { background: var(--accent); width: 24px; border-radius: 4px; }
    .nav-dot.done { background: var(--green); }
    .nav-actions { display: flex; gap: 8px; }

    .btn { padding: 10px 20px; border-radius: 10px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; gap: 6px; border: none; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 2px 12px rgba(99,102,241,.25); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,102,241,.35); }
    .btn-secondary { background: transparent; border: 1.5px solid var(--border); color: var(--text2); }
    .btn-secondary:hover { border-color: var(--border2); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeInUp .35s cubic-bezier(.4,0,.2,1) both; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="chrome"><div class="chrome-inner">
    <a class="chrome-brand" href="/" style="text-decoration:none; color:inherit; cursor:pointer;"><div class="chrome-logo"></div><span>Concept LB</span></a>
    <div class="chrome-actions">
      <button class="chrome-btn" onclick="window.location.href='/plans'">My Plans</button>
      <button class="chrome-btn" onclick="resetWizard()">Reset</button>
    </div>
  </div></div>
  <div class="progress-track"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="main" id="main"><div id="stepContent" class="animate-in"></div><div class="warn" id="warnBox"></div></div>
  <div class="bottom-nav"><div class="bottom-nav-inner">
    <div class="nav-steps" id="navDots"></div>
    <div class="nav-actions">
      <button class="btn btn-secondary" id="btnBack" onclick="goBack()">Back</button>
      <button class="btn btn-primary" id="btnNext" onclick="goNext()">Continue</button>
    </div>
  </div></div>

  <script>

    const STORAGE_KEY="conceptlb_intake_v1";
    const DEFAULTS={concept_name:"",one_liner:"",cuisine_type:"Modern Mediterranean",cuisine_other:"",service_model:"Dine-in",differentiator:"",country:"Lebanon",city:"Beirut",neighborhood_type:"street",size_sqm:35,seating_capacity:18,delivery_flag:true,alcohol_flag:false,target_audience:["Young professionals","Foodies"],price_positioning:"mid",competitors:[],competitive_edge:"",brand_personality_keywords:["bold","minimal"],interior_mood_keywords:["clean","modern"],meal_periods:["lunch","dinner"],beverage_direction:"coffee_focus",operating_hours:"12:00-23:30",founder_background:"",experience_level:"first_time_founder",ownership_structure:"solo",budget_tier:"mid",expected_daily_orders:null,avg_ticket_usd:null,monthly_rent_usd:null,capex_budget_usd:null,staff_model:"lean",sales_mix_dinein_pct:40,sales_mix_takeaway_pct:40,sales_mix_delivery_pct:20,target_cogs_pct:null,kitchen_type:"full_line",operating_days_per_week:6,alcohol_license_status:"not_allowed",opening_budget_usd:null,funding_equity_pct:50,funding_loan_pct:50,avg_check_morning:null,avg_check_daytime:null,avg_check_evening:null,revenue_growth_pct:3,ramp_up_months:4,ramp_start_pct:60,expected_daily_orders__source:"user_unknown",avg_ticket_usd__source:"user_unknown",monthly_rent_usd__source:"user_unknown",capex_budget_usd__source:"user_unknown",staff_model__source:"user_unknown",sales_mix__source:"user_unknown",target_cogs_pct__source:"user_unknown",kitchen_type__source:"user_unknown",operating_days_per_week__source:"user_unknown",alcohol_license_status__source:"user_unknown",opening_budget_usd__source:"user_unknown",_model:"gpt-5.4-nano-2026-03-17"};
    const OPT={cuisine:["Modern Mediterranean","Lebanese","Italian","Japanese","Mexican","Burgers","Cafe","Other"],service:[{v:"qsr",t:"QSR / Fast Casual"},{v:"hybrid",t:"Hybrid (dine-in + takeaway)"},{v:"dine_in",t:"Full Dine-in"}],neighborhood:[{v:"street",t:"Street"},{v:"mall",t:"Mall"},{v:"residential",t:"Residential"},{v:"business",t:"Business District"},{v:"seaside",t:"Seaside"}],price:[{v:"affordable",t:"Affordable"},{v:"mid",t:"Mid-range"},{v:"premium",t:"Premium"}],meals:["breakfast","brunch","lunch","dinner","late_night"],beverage:[{v:"coffee_focus",t:"Coffee Focus"},{v:"juice_bar",t:"Juice Bar"},{v:"mocktails",t:"Mocktails"},{v:"full_bar",t:"Full Bar"}],experience:[{v:"new",t:"First-time Founder"},{v:"some",t:"Some Experience"},{v:"expert",t:"Expert Operator"}],ownership:[{v:"solo",t:"Solo"},{v:"partners",t:"Partners"},{v:"family",t:"Family"},{v:"investors",t:"Investors"}],budget:[{v:"starter",t:"Starter"},{v:"mid",t:"Mid-tier"},{v:"premium",t:"Premium"}],audience:["Young professionals","Families","Tourists","Students","Health-conscious diners","Office workers","Night crowd"],brand_kw:["bold","minimal","playful","premium","friendly","fast","craft","clean","warm","urban"],mood_kw:["clean","modern","industrial","cozy","bright","dark","natural","minimal","colorful","heritage"],staff:[{v:"lean",t:"Lean (2-3)"},{v:"standard",t:"Standard (4-6)"},{v:"full",t:"Full (7+)"},{v:"custom",t:"Custom"}],kitchen:[{v:"full_line",t:"Full Cooking Line"},{v:"prep_finish",t:"Prep + Finishing"},{v:"assembly_only",t:"Assembly Only"},{v:"central_kitchen",t:"Central Kitchen"}],alcohol_status:[{v:"confirmed",t:"Confirmed"},{v:"applying",t:"Applying"},{v:"not_allowed",t:"Not Allowed"}]};
    const STEPS=[{id:"identity",title:"What's your concept?",desc:"The name, the pitch, and what makes it different."},{id:"location",title:"Where will it live?",desc:"Location, size, and physical format of your restaurant."},{id:"brand",title:"Who are you serving?",desc:"Target audience, pricing, brand personality, and competitive landscape."},{id:"ops",title:"How will it operate?",desc:"Meal periods, beverages, team structure, and your background."},{id:"anchors",title:"Financial foundations",desc:"The numbers that drive your projections. Skip what you don't know yet."},{id:"review",title:"Ready to generate",desc:"Review everything, then we'll build your full concept plan."}];

    let S=loadState(),step=0;
    function loadState(){try{const r=localStorage.getItem(STORAGE_KEY);return r?{...structuredClone(DEFAULTS),...JSON.parse(r)}:structuredClone(DEFAULTS);}catch{return structuredClone(DEFAULTS);}}
    function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(S));}
    function resetWizard(){if(!confirm("Reset all fields?"))return;S=structuredClone(DEFAULTS);step=0;save();render();}

    function h(tag,props={},...kids){const el=document.createElement(tag);Object.entries(props).forEach(([k,v])=>{if(k==='class')el.className=v;else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else if(k.startsWith('on'))el.addEventListener(k.slice(2),v);else el.setAttribute(k,v);});kids.flat().forEach(c=>{if(typeof c==='string')el.appendChild(document.createTextNode(c));else if(c)el.appendChild(c);});return el;}

    function fieldGroup({label,required,hint,full,content}){const fg=h('div',{class:'field-group'+(full?' full':'')});const fl=h('div',{class:'field-label'});fl.appendChild(h('label',{},label));if(required)fl.appendChild(h('span',{class:'req'},'Required'));fg.appendChild(fl);fg.appendChild(content);if(hint)fg.appendChild(h('div',{class:'field-hint'},hint));return fg;}
    function textInput(key,{placeholder=''}={}){const el=h('input',{placeholder,value:S[key]??''});el.oninput=()=>{S[key]=el.value;save();};return el;}
    function numberInput(key,{min,max}={}){const el=h('input',{type:'number',value:S[key]??''});if(min!=null)el.min=min;if(max!=null)el.max=max;el.oninput=()=>{const n=Number(el.value);S[key]=Number.isFinite(n)?n:null;save();};return el;}
    function textArea(key,{placeholder=''}={}){const el=h('textarea',{placeholder});el.value=S[key]??'';el.oninput=()=>{S[key]=el.value;save();};return el;}
    function selectInput(key,options){const el=h('select');options.forEach(o=>{el.appendChild(h('option',{value:typeof o==='string'?o:o.v},typeof o==='string'?o:o.t));});el.value=S[key];el.onchange=()=>{S[key]=el.value;save();render();};return el;}
    function boolSelect(key){const el=h('select');[{v:'true',t:'Yes'},{v:'false',t:'No'}].forEach(o=>el.appendChild(h('option',{value:o.v},o.t)));el.value=String(!!S[key]);el.onchange=()=>{S[key]=el.value==='true';save();};return el;}
    function chipsMulti(key,choices,mx=3){const box=h('div',{class:'chips'});const set=new Set((Array.isArray(S[key])?S[key]:[]).filter(x=>choices.includes(x)));S[key]=[...set];save();choices.forEach(c=>{const chip=h('div',{class:'chip'+(set.has(c)?' on':'')},c);chip.onclick=()=>{if(set.has(c))set.delete(c);else if(set.size<mx)set.add(c);else return;S[key]=[...set];save();render();};box.appendChild(chip);});return box;}
    function tagInput(key){const tags=Array.isArray(S[key])?S[key]:[];const box=h('div',{class:'tag-box'});function rebuild(){box.innerHTML='';tags.forEach((t,i)=>{const btn=h('button',{type:'button',onclick:()=>{tags.splice(i,1);S[key]=tags;save();rebuild();}},'×');box.appendChild(h('span',{class:'tag'},t,btn));});const inp=h('input',{class:'tag-input',placeholder:'Type and press Enter…'});inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();const v=inp.value.trim();if(v&&!tags.includes(v)){tags.push(v);S[key]=tags;save();}rebuild();}};box.appendChild(inp);}rebuild();return box;}
    function sourceToggle(sk,vk=[]){const row=h('div',{class:'source-row'});row.appendChild(h('span',{},'Confidence:'));const sel=h('select');[{v:'user_provided',t:'I know this'},{v:'user_unknown',t:'Not sure yet'}].forEach(o=>sel.appendChild(h('option',{value:o.v},o.t)));sel.value=S[sk]||'user_unknown';sel.onchange=()=>{S[sk]=sel.value;if(sel.value==='user_unknown')vk.forEach(k=>S[k]=null);save();render();};row.appendChild(sel);return row;}

    function renderIdentity(){const f=h('div',{class:'fields'});const r1=h('div',{class:'field-row'});r1.appendChild(fieldGroup({label:'Concept Name',required:true,hint:'Short, memorable, and brandable.',content:textInput('concept_name',{placeholder:'e.g., Olive & Thyme'})}));r1.appendChild(fieldGroup({label:'Cuisine Type',required:true,content:selectInput('cuisine_type',OPT.cuisine)}));f.appendChild(r1);if(S.cuisine_type==='Other')f.appendChild(fieldGroup({label:'Cuisine (specify)',required:true,full:true,content:textInput('cuisine_other',{placeholder:'e.g., Modern Levantine Street Food'})}));f.appendChild(fieldGroup({label:'One-liner',required:true,full:true,hint:'One sentence that sells the idea instantly.',content:textInput('one_liner',{placeholder:'e.g., Modern Mediterranean kitchen with Lebanese roots'})}));const r2=h('div',{class:'field-row'});r2.appendChild(fieldGroup({label:'Service Model',required:true,hint:'Drives plan structure and assumptions.',content:selectInput('service_model',OPT.service)}));r2.appendChild(h('div'));f.appendChild(r2);f.appendChild(fieldGroup({label:'What makes you different?',required:true,full:true,hint:'Your edge vs. nearby competitors.',content:textArea('differentiator',{placeholder:'e.g., Fresh locally-sourced ingredients with a Lebanese twist on Mediterranean classics.'})}));return f;}

    function renderLocation(){const f=h('div',{class:'fields'});const r1=h('div',{class:'field-row'});r1.appendChild(fieldGroup({label:'Country',required:true,content:textInput('country')}));r1.appendChild(fieldGroup({label:'City',required:true,content:textInput('city')}));f.appendChild(r1);const r2=h('div',{class:'field-row'});r2.appendChild(fieldGroup({label:'Neighborhood Type',required:true,content:selectInput('neighborhood_type',OPT.neighborhood)}));r2.appendChild(fieldGroup({label:'Size (sqm)',required:true,hint:'Total floor area.',content:numberInput('size_sqm',{min:5,max:1000})}));f.appendChild(r2);const r3=h('div',{class:'field-row'});r3.appendChild(fieldGroup({label:'Seating Capacity',required:true,hint:'0 = delivery only.',content:numberInput('seating_capacity',{min:0,max:400})}));r3.appendChild(fieldGroup({label:'Delivery?',required:true,content:boolSelect('delivery_flag')}));f.appendChild(r3);f.appendChild(fieldGroup({label:'Alcohol Served?',required:true,hint:'Enables the alcoholic beverage program.',content:boolSelect('alcohol_flag')}));return f;}

    function renderBrand(){const f=h('div',{class:'fields'});f.appendChild(fieldGroup({label:'Target Audience',full:true,hint:'Select 1-3.',content:chipsMulti('target_audience',OPT.audience)}));f.appendChild(fieldGroup({label:'Price Positioning',required:true,content:selectInput('price_positioning',OPT.price)}));f.appendChild(fieldGroup({label:'Competitors',full:true,hint:'Type a name and press Enter.',content:tagInput('competitors')}));f.appendChild(fieldGroup({label:'Your competitive edge',full:true,hint:'How you win.',content:textArea('competitive_edge',{placeholder:'e.g., Faster service, better quality, cleaner brand.'})}));f.appendChild(fieldGroup({label:'Brand Personality',full:true,hint:'Pick 2-5.',content:chipsMulti('brand_personality_keywords',OPT.brand_kw,5)}));f.appendChild(fieldGroup({label:'Interior Mood',full:true,hint:'Pick 2-5.',content:chipsMulti('interior_mood_keywords',OPT.mood_kw,5)}));return f;}

    function renderOps(){const f=h('div',{class:'fields'});f.appendChild(fieldGroup({label:'Meal Periods',required:true,full:true,hint:'Select at least one.',content:chipsMulti('meal_periods',OPT.meals,5)}));const r1=h('div',{class:'field-row'});r1.appendChild(fieldGroup({label:'Beverage Direction',required:true,content:selectInput('beverage_direction',OPT.beverage)}));r1.appendChild(fieldGroup({label:'Operating Hours',required:true,content:textInput('operating_hours',{placeholder:'12:00 - 23:30'})}));f.appendChild(r1);f.appendChild(fieldGroup({label:'Founder Background',full:true,hint:'1-3 sentences. Woven into the plan.',content:textArea('founder_background',{placeholder:'e.g., 8 years in hospitality, previously managed a chain of neighborhood cafes.'})}));const r2=h('div',{class:'field-row'});r2.appendChild(fieldGroup({label:'Experience Level',required:true,content:selectInput('experience_level',OPT.experience)}));r2.appendChild(fieldGroup({label:'Ownership',required:true,content:selectInput('ownership_structure',OPT.ownership)}));f.appendChild(r2);f.appendChild(fieldGroup({label:'Budget Tier',required:true,content:selectInput('budget_tier',OPT.budget)}));return f;}

    function renderAnchors(){const f=h('div',{class:'fields'});function af(label,key,sk,hint,opts={}){const fg=fieldGroup({label,full:true,hint,content:numberInput(key,opts)});fg.appendChild(sourceToggle(sk||(key+'__source'),[key]));return fg;}f.appendChild(af('Expected daily orders','expected_daily_orders',null,'Drives revenue and staffing.',{min:0,max:2000}));f.appendChild(af('Average ticket (USD)','avg_ticket_usd',null,'Even a rough number helps.',{min:0,max:1000}));f.appendChild(af('Monthly rent (USD)','monthly_rent_usd',null,'AI can\'t guess rent. High impact.',{min:0,max:50000}));f.appendChild(af('Setup budget / capex (USD)','capex_budget_usd',null,'Total investment for opening.',{min:0,max:1000000}));f.appendChild(fieldGroup({label:'Staff model',full:true,hint:'Used for payroll feasibility.',content:selectInput('staff_model',OPT.staff)}));const mx=h('div',{class:'field-row',style:{gridTemplateColumns:'1fr 1fr 1fr'}});mx.appendChild(fieldGroup({label:'Dine-in %',content:numberInput('sales_mix_dinein_pct',{min:0,max:100})}));mx.appendChild(fieldGroup({label:'Takeaway %',content:numberInput('sales_mix_takeaway_pct',{min:0,max:100})}));mx.appendChild(fieldGroup({label:'Delivery %',content:numberInput('sales_mix_delivery_pct',{min:0,max:100})}));const mw=h('div',{class:'field-group full'});mw.appendChild(h('div',{class:'field-label'},h('label',{},'Sales channel mix (~100%)')));mw.appendChild(mx);mw.appendChild(sourceToggle('sales_mix__source',['sales_mix_dinein_pct','sales_mix_takeaway_pct','sales_mix_delivery_pct']));f.appendChild(mw);f.appendChild(af('Target food cost % (COGS)','target_cogs_pct',null,'Typical: 25-40%.',{min:0,max:100}));const r3=h('div',{class:'field-row'});const kt=fieldGroup({label:'Kitchen type',content:selectInput('kitchen_type',OPT.kitchen)});kt.appendChild(sourceToggle('kitchen_type__source'));r3.appendChild(kt);const dy=fieldGroup({label:'Operating days/week',content:numberInput('operating_days_per_week',{min:1,max:7})});dy.appendChild(sourceToggle('operating_days_per_week__source',['operating_days_per_week']));r3.appendChild(dy);f.appendChild(r3);const al=fieldGroup({label:'Alcohol license status',full:true,hint:'Legal reality, not just intent.',content:selectInput('alcohol_license_status',OPT.alcohol_status)});al.appendChild(sourceToggle('alcohol_license_status__source'));f.appendChild(al);const dv=h('div',{class:'divider'});dv.innerHTML='<h3>Financial Model</h3><p>These generate your separate Financial Model PDF. Leave blank for defaults.</p>';f.appendChild(dv);f.appendChild(af('Opening budget (USD)','opening_budget_usd',null,'Total capital for opening.',{min:0}));const fr=h('div',{class:'field-row'});fr.appendChild(fieldGroup({label:'Equity %',content:numberInput('funding_equity_pct',{min:0,max:100})}));fr.appendChild(fieldGroup({label:'Loan %',content:numberInput('funding_loan_pct',{min:0,max:100})}));f.appendChild(fr);const cr=h('div',{class:'field-row',style:{gridTemplateColumns:'1fr 1fr 1fr'}});cr.appendChild(fieldGroup({label:'Avg check: Morning',content:numberInput('avg_check_morning',{min:0})}));cr.appendChild(fieldGroup({label:'Avg check: Daytime',content:numberInput('avg_check_daytime',{min:0})}));cr.appendChild(fieldGroup({label:'Avg check: Evening',content:numberInput('avg_check_evening',{min:0})}));f.appendChild(cr);const pr=h('div',{class:'field-row',style:{gridTemplateColumns:'1fr 1fr 1fr'}});pr.appendChild(fieldGroup({label:'Growth %/year',hint:'Default: 3%',content:numberInput('revenue_growth_pct',{min:0,max:20})}));pr.appendChild(fieldGroup({label:'Ramp-up months',hint:'Default: 4',content:numberInput('ramp_up_months',{min:1,max:12})}));pr.appendChild(fieldGroup({label:'Ramp start %',hint:'Default: 60%',content:numberInput('ramp_start_pct',{min:10,max:100})}));f.appendChild(pr);return f;}

    function renderReview(){const f=h('div',{class:'review-grid'});function card(title,si,rows){const c=h('div',{class:'review-card'});const hd=h('div',{class:'review-card-header'},title);hd.appendChild(h('span',{class:'edit-link',onclick:()=>{step=si;render();}},'Edit'));c.appendChild(hd);const bd=h('div',{class:'review-card-body'});rows.forEach(([k,v])=>{const rw=h('div',{class:'review-row'});rw.appendChild(h('span',{class:'review-key'},k));rw.appendChild(h('span',{class:'review-val'},String(v??'—')));bd.appendChild(rw);});c.appendChild(bd);return c;}
    const mc=h('div',{class:'review-card'});const mh=h('div',{class:'review-card-header'},'AI Model');mc.appendChild(mh);const mb=h('div',{class:'review-card-body',style:{padding:'16px'}});const ms=h('select',{style:{maxWidth:'400px'}});[{v:'gpt-5.4-nano-2026-03-17',t:'GPT-5.4 Nano — Fast & cheap (~$0.65/plan)'},{v:'gpt-5.4-2026-03-05',t:'GPT-5.4 — High quality (~$3-4/plan)'}].forEach(o=>ms.appendChild(h('option',{value:o.v},o.t)));ms.value=S._model||'gpt-5.4-nano-2026-03-17';ms.onchange=()=>{S._model=ms.value;save();};mb.appendChild(fieldGroup({label:'Choose AI model for generation',hint:'Nano is great for testing. Use GPT-5.4 for production-quality plans.',content:ms}));mc.appendChild(mb);f.appendChild(mc);f.appendChild(card('Concept Identity',0,[['Name',S.concept_name],['Cuisine',S.cuisine_type==='Other'?S.cuisine_other:S.cuisine_type],['One-liner',S.one_liner],['Service Model',S.service_model],['Differentiator',S.differentiator||'—']]));f.appendChild(card('Location & Format',1,[['Country',S.country],['City',S.city],['Neighborhood',S.neighborhood_type],['Size (sqm)',S.size_sqm],['Seating',S.seating_capacity],['Delivery',S.delivery_flag?'Yes':'No'],['Alcohol',S.alcohol_flag?'Yes':'No']]));f.appendChild(card('Market & Brand',2,[['Audience',(S.target_audience||[]).join(', ')||'—'],['Pricing',S.price_positioning],['Competitors',(S.competitors||[]).join(', ')||'—'],['Competitive Edge',S.competitive_edge||'—'],['Brand Personality',(S.brand_personality_keywords||[]).join(', ')||'—'],['Interior Mood',(S.interior_mood_keywords||[]).join(', ')||'—']]));f.appendChild(card('Operations',3,[['Meal Periods',(S.meal_periods||[]).join(', ')],['Operating Hours',S.operating_hours],['Beverage Direction',S.beverage_direction],['Experience Level',S.experience_level],['Ownership',S.ownership_structure],['Budget Tier',S.budget_tier],['Founder',S.founder_background||'—']]));f.appendChild(card('Financial Anchors',4,[['Daily Orders',S.expected_daily_orders??'—'],['Avg Ticket',S.avg_ticket_usd?'$'+S.avg_ticket_usd:'—'],['Monthly Rent',S.monthly_rent_usd?'$'+S.monthly_rent_usd:'—'],['Capex Budget',S.capex_budget_usd?'$'+S.capex_budget_usd.toLocaleString():'—'],['Staff Model',S.staff_model],['Channel Mix',S.sales_mix_dinein_pct+'% dine / '+S.sales_mix_takeaway_pct+'% take / '+S.sales_mix_delivery_pct+'% delivery'],['Target COGS %',S.target_cogs_pct?S.target_cogs_pct+'%':'—'],['Kitchen Type',S.kitchen_type],['Days/Week',S.operating_days_per_week],['Alcohol License',S.alcohol_license_status]]));f.appendChild(card('Financial Model',4,[['Opening Budget',S.opening_budget_usd?'$'+S.opening_budget_usd.toLocaleString():'—'],['Funding',S.opening_budget_usd?(S.funding_equity_pct+'% equity / '+S.funding_loan_pct+'% loan'):'—'],['Avg Check Morning',S.avg_check_morning?'$'+S.avg_check_morning:'—'],['Avg Check Daytime',S.avg_check_daytime?'$'+S.avg_check_daytime:'—'],['Avg Check Evening',S.avg_check_evening?'$'+S.avg_check_evening:'—'],['Growth %/year',S.revenue_growth_pct+'%'],['Ramp-up',S.ramp_up_months+' months from '+S.ramp_start_pct+'%']]));return f;}

    function validate(idx){const id=STEPS[idx].id,e=[];const blank=v=>!v||String(v).trim()==='';if(id==='identity'){if(blank(S.concept_name))e.push('Concept Name is required.');if(blank(S.one_liner))e.push('One-liner is required.');if(blank(S.cuisine_type))e.push('Cuisine Type is required.');if(S.cuisine_type==='Other'&&blank(S.cuisine_other))e.push('Specify your cuisine.');if(blank(S.service_model))e.push('Service Model is required.');if(blank(S.differentiator))e.push('Differentiator is required.');}if(id==='location'){if(blank(S.country))e.push('Country is required.');if(blank(S.city))e.push('City is required.');const sz=Number(S.size_sqm),se=Number(S.seating_capacity);if(!Number.isFinite(sz)||sz<=0)e.push('Size must be positive.');if(!Number.isFinite(se)||se<0)e.push('Seating must be 0+.');if(se===0&&!S.delivery_flag)e.push('0 seats requires delivery.');}if(id==='brand'){if(blank(S.price_positioning))e.push('Price Positioning is required.');}if(id==='ops'){if(!(S.meal_periods||[]).length)e.push('Select at least one meal period.');if(blank(S.beverage_direction))e.push('Beverage Direction is required.');if(blank(S.operating_hours))e.push('Operating Hours is required.');if(blank(S.experience_level))e.push('Experience Level is required.');if(blank(S.ownership_structure))e.push('Ownership is required.');if(blank(S.budget_tier))e.push('Budget Tier is required.');}if(id==='anchors'&&S.sales_mix__source==='user_provided'){const t=(S.sales_mix_dinein_pct||0)+(S.sales_mix_takeaway_pct||0)+(S.sales_mix_delivery_pct||0);if(t<90||t>110)e.push('Channel mix should total ~100%.');}return e;}

    function goBack(){if(step>0){step--;render();}}
    async function goNext(){hideWarn();if(STEPS[step].id!=='review'){const errs=validate(step);if(errs.length){showWarn(errs.join('\n'));return;}step++;render();return;}const allOk=[0,1,2,3].every(i=>!validate(i).length);if(!allOk){showWarn('Some required fields are missing.');return;}save();await startJob();}
    function showWarn(msg){const w=document.getElementById('warnBox');w.style.display='block';w.textContent=msg;}
    function hideWarn(){const w=document.getElementById('warnBox');w.style.display='none';w.textContent='';}

    function render(){const s=STEPS[step];const root=document.getElementById('stepContent');root.innerHTML='';root.className='';void root.offsetWidth;root.className='animate-in';root.appendChild(h('div',{class:'step-badge'},'Step '+(step+1)+' of '+STEPS.length));root.appendChild(h('h1',{class:'step-title'},s.title));root.appendChild(h('p',{class:'step-desc'},s.desc));const renderers={identity:renderIdentity,location:renderLocation,brand:renderBrand,ops:renderOps,anchors:renderAnchors,review:renderReview};root.appendChild(renderers[s.id]());document.getElementById('progressBar').style.width=(step/(STEPS.length-1))*100+'%';const dots=document.getElementById('navDots');dots.innerHTML='';STEPS.forEach((_,i)=>{dots.appendChild(h('div',{class:'nav-dot'+(i===step?' active':'')+(i<step?' done':''),onclick:()=>{if(i<=step){step=i;render();}}}));});document.getElementById('btnBack').disabled=step===0;document.getElementById('btnBack').style.visibility=step===0?'hidden':'visible';document.getElementById('btnNext').textContent=s.id==='review'?'Generate Plan':'Continue';hideWarn();window.scrollTo({top:0,behavior:'smooth'});}

    function buildPayload(){const p={...S};if(p.cuisine_type==='Other')p.cuisine_type=p.cuisine_other||'Other';delete p.cuisine_other;['target_audience','brand_personality_keywords','interior_mood_keywords','meal_periods','competitors'].forEach(k=>{p[k]=Array.isArray(p[k])?p[k]:[];});p.confidence={};['expected_daily_orders','avg_ticket_usd','monthly_rent_usd','capex_budget_usd','staff_model','sales_mix','target_cogs_pct','kitchen_type','operating_days_per_week','alcohol_license_status'].forEach(k=>{p.confidence[k]=S[k+'__source'];});Object.keys(p).filter(k=>k.endsWith('__source')).forEach(k=>delete p[k]);p._model=S._model||'gpt-5.4-nano-2026-03-17';return p;}

    async function startJob(){const btn=document.getElementById('btnNext');btn.disabled=true;btn.textContent='Starting…';try{const res=await fetch('/api/generate-job?chunk_size=4&max_workers=3',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(buildPayload())});if(!res.ok)throw new Error(await res.text()||'HTTP '+res.status);const data=await res.json();if(!data.job_id)throw new Error('No job_id.');window.location.href='/jobs/'+data.job_id;}catch(e){showWarn('Failed:\n'+(e.message||e));btn.disabled=false;btn.textContent='Generate Plan';}}

    render();
  </script>
