<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concept LB — Generator</title>
  <style>
    body { margin:0; font-family: system-ui, Arial; background:#0b0f14; color:#e8eef6; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 28px 18px; }
    h1 { margin: 0 0 12px; font-size: 22px; }
    .card { background:#111823; border:1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 16px; }
    textarea { width:100%; min-height: 260px; background:#0f1520; color:#e8eef6; border:1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 12px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 13px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; margin-top: 12px; align-items:center; }
    button { background:#7aa2ff; color:#0b0f14; border:0; padding:10px 14px; border-radius: 12px; font-weight: 700; cursor:pointer; }
    button:disabled { opacity: .6; cursor:not-allowed; }
    input { background:#0f1520; color:#e8eef6; border:1px solid rgba(255,255,255,0.12); border-radius: 12px; padding:10px 12px; width: 120px; }
    .hint { color:#a9b4c3; font-size: 13px; }
    .err { color:#ffb4b4; margin-top: 10px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Concept LB — HTML Generator</h1>

    <div class="card">
      <div class="hint">Paste intake JSON, then generate the full document with progress.</div>

      <textarea id="intake">
{
  "concept_name": "Bun and Bloom",
  "one_liner": "A bright, playful burger bar with clean ingredients and fast service.",
  "cuisine_type": "Modern burgers",
  "service_model": "qsr",
  "differentiator": "Pressed brioche buns, mess-free eating, premium sauces",
  "city": "Beirut",
  "neighborhood_type": "street",
  "size_sqm": 35,
  "seating_capacity": 18,
  "alcohol_flag": false,
  "target_audience": "Young professionals and foodies",
  "price_positioning": "mid",
  "meal_periods": ["lunch", "dinner"],
  "competitors": ["Classic Burger Joint", "Local Smash Burger", "Premium Sandwich Bar"],
  "competitive_edge": "Cleaner execution, strong brand vibe, faster service",
  "brand_personality_keywords": ["bold", "minimal", "playful"],
  "interior_mood_keywords": ["bright", "clean", "modern"],
  "beverage_direction": "coffee_focus",
  "delivery_flag": true,
  "operating_hours": "12:00-23:30",
  "founder_background": "First-time founder with strong operations mindset",
  "ownership_structure": "solo",
  "budget_tier": "mid",
  "experience_level": "some"
}
      </textarea>

      <div class="row">
        <label class="hint">chunk_size</label>
        <input id="chunkSize" type="number" value="6" min="3" max="12" />
        <label class="hint">max_workers</label>
        <input id="maxWorkers" type="number" value="3" min="1" max="8" />
        <button id="btn" onclick="startJob()">Generate Full Document</button>
        <span class="hint" id="status"></span>
      </div>

      <div class="err" id="err"></div>
    </div>
  </div>

  <script>
    async function startJob() {
      const btn = document.getElementById("btn");
      const status = document.getElementById("status");
      const err = document.getElementById("err");
      err.textContent = "";

      let intakeText = document.getElementById("intake").value.trim();
      let chunkSize = Number(document.getElementById("chunkSize").value || 6);
      let maxWorkers = Number(document.getElementById("maxWorkers").value || 3);

      // basic guard
      if (!intakeText) {
        err.textContent = "Intake JSON is empty.";
        return;
      }

      btn.disabled = true;
      status.textContent = "Starting…";

      try {
        const res = await fetch(`/api/generate-job?chunk_size=${encodeURIComponent(chunkSize)}&max_workers=${encodeURIComponent(maxWorkers)}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: intakeText
        });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || `HTTP ${res.status}`);
        }

        const data = await res.json();
        if (!data.job_id) throw new Error("Missing job_id in response.");

        window.location.href = `/jobs/${data.job_id}`;
      } catch (e) {
        err.textContent = String(e?.message || e);
        btn.disabled = false;
        status.textContent = "";
      }
    }
  </script>
</body>
</html>
